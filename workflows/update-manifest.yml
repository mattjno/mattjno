name: ../.github/workflows/Update site manifest (R2)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm i @aws-sdk/client-s3 image-size

      - name: Generate site manifest from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          NEXT_PUBLIC_PHOTO_BASE: ${{ vars.NEXT_PUBLIC_PHOTO_BASE }}
        run: node scripts/generate-manifests.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "mattjno-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/site.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update site manifest from R2"
            git push
          fi
